- name : roboshop instances management
  hosts : local
  connection : local
  vars :
    instances : ["mongodb","redis","rabbitmq","mysql"]
    image_id : ami-0220d79f3f480ecf5
    region: us-east-1
    domain_name : dinakardevops.online
  tasks :
  - name : create ec2 instances
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      name : "roboshop-{{ item }}"
      image_id: "{{ image_id }}"
      security_groups:
      - "roboshop-{{ item }}"
      - roboshop-common
      region: "{{ region }}"
    loop : "{{ instances }}"
    register : ec2_output

  # - name : print output
  #   debug :
  #     msg : " {{ ec2_output }} "

  # - name : create R53 records
  #   debug :
  #     msg : " instance_name : {{ item.item }} private_ip : {{ item.instances[0].private_ip_address }}  "
  #   loop : "{{ ec2_output.results }}"

  - name : Create Route53 records
    amazon.aws.route53 :
      state: present
      zone: "{{ domain_name }}"
      rocord : "{{ item.item }}. {{ domain_name }}" #mongodb.dinakardevops.online
      type: A
      ttl: 1
      value : "{{ item.instances[0].private_ip_address }}"
    loop : "{{ ec2_output.results }}"

  - name : Create Route53 record for frontend 
    amazon.aws.route53 :
      state: present
      zone: "{{ domain_name }}"
      rocord : "{{ domain_name }}" #mongodb.dinakardevops.online
      type: A
      ttl: 1
      value : "{{ item.instances[0].public_ip_address }}"
    loop : "{{ ec2_output.results }}" 
    when : item.item == "frontend"