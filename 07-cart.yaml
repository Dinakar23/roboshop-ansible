- name : configuring the cart 
  host : cart
  become : yes

  tasks :
  - name : enable nodejs 20
    command : dnf module enable nodejs:20 -y

  - name : Install nodejs
    package :
      name : nodejs
      state : present
  
  - name : Create system user
    user :
      name : roboshop
      system : true 
      home : /app
      shell: /sbin/nologin
      comment: "roboshop system user"
  
  - name : Delete /app directory
    file :
      path : /app
      state : absent
  
  - name : Delete  cart.zip in /tmp
    file :
      path : /tmp/cart.zip
      state : absent
  
  - name : create app directory
    file :
      paht : /app
      state : directory
  
  - name : Download cart code
    get_url :
      src : https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
      dest : /tmp/cart.zip

  - name : unzip cart
    unarchive :
      src : /tmp/cart.zip
      dest : /app
      remote_src : yes
  
  - name : Install dependencies
    community.general.npm:
      path: /app

  - name : copy service
    template :
      src : cart.ser.j2
      dest : /etc/systemd/system/cart.service

  - name : daemon reload
    systemd_service:
      name : cart
      daemon_reload : true

  - name : Start and enable cart
    service :
      name : cart
      state : restarted
      enable : yes

