- name : configuring payment service
  hosts : payment
  become : yes

  tasks :
  - name : Install python package
    package :
      name : "{{ item }}"
      state : present
    loop :
    - python3 
    - gcc 
    - python3-devel

  - name : creating system user
    user :
      name : roboshop
      home : /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name : remove app directory
    file :
      path : /app
      state : absent

  - name : Delete payment service
    file:
      path : /tmp/payment.zip
      state : absent

  - name : creating app directory
    file : 
      path : /app
      state : directory
      owner : roboshop
      group : roboshop

  - name : Download payment
    get_url :
      url : https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
      dest : /tmp/payment.zip
  
  - name : unzip payment
    unarchive:
      src : /tmp/payment.zip
      dest : /app
      remote_src: yes

  - name: Fix extracted files permissions
    ansible.builtin.file:
      path: /app
      owner: roboshop
      group: roboshop
      recurse: yes

  - name: Install dependencies
    pip :
      requirements : requirements.txt
      executable: pip3.9
    args :
      chdir : /app

  - name : copy service
    template :
      src : payment.service.j2
      dest : /etc/systemd/system/payment.service

  - name : daemon reload
    systemd_service:
      name : payment
      daemon_reload : true

  - name : Start and enable payment
    service :
      name : payment
      state : restarted
      enabled : yes



  

      
