- name : configuring the mysql server
  hosts : mysql
  become : yes

  tasks :
  - name : Install mysql
    package :
      name : mysql
      state : present

  - name : Start MySQL Service
    service :
      name : mysqld
      state : started
      enabled : yes

  - name : Setup root password
    command : mysql_secure_installation --set-root-pass RoboShop@1