- name : configuring the mysql server
  hosts : mysql
  become : yes

  tasks :
  - name : installing mysql server
    package :
      name : mysql
      state : present
  
  - name : start and enabling the services
    service :
      name : mysqld
      state : restarted
      enabled : yes

  - name : setup root password
    command : mysql_secure_installation --set-root-pass RoboShop@1