- name: configuring mysql server
  hosts: mysql
  become: yes

  tasks:

  - name: Install mysql server
    package:
      name: mysql-server
      state: present

  - name: Start and enable mysql
    service:
      name: mysqld
      state: started
      enabled: yes

  - name: Set root password
    command: mysql_secure_installation --set-root-pass RoboShop@1

  - name: Install PyMySQL
    pip:
      name: PyMySQL
      executable: pip3

  - name: Allow root login from any host
    community.mysql.mysql_user:
      name: root
      host: "%"
      password: RoboShop@1
      priv: ".,GRANT"
      state: present
      login_user: root
      login_password: RoboShop@1

  - name: Flush privileges
    community.mysql.mysql_query:
      login_user: root
      login_password: RoboShop@1
      query: FLUSH PRIVILEGES;