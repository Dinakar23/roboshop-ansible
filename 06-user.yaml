- name : configuring the user 
  hosts : user
  become : yes

  tasks :
  - name : enable nodejs 20
    command : dnf module enable nodejs:20 -y

  - name : Install nodejs
    package :
      name : nodejs
      state : present
  
  - name : Create system user
    user :
      name : roboshop
      system : true 
      home : /app
      shell: /sbin/nologin
      comment: "roboshop system user"
  
  - name : Delete /app directory
    file :
      path : /app
      state : absent
  
  - name : Delete  user.zip in /tmp
    file :
      path : /tmp/user.zip
      state : absent
  
  - name : create app directory
    file :
      path : /app
      state : directory
  
  - name : Download user code
    get_url :
      url : https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest : /tmp/user.zip

  - name : unzip user
    unarchive :
      src : /tmp/user.zip
      dest : /app
      remote_src : yes
  
  - name : Install dependencies
    community.general.npm:
      path: /app

  - name : copy service
    template :
      src : user.service.j2
      dest : /etc/systemd/system/user.service

  - name : daemon reload
    systemd_service:
      name : user
      daemon_reload : true

  - name : Start and enable user
    service :
      name : user
      state : restarted
      enabled : yes

