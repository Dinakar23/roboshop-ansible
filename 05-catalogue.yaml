- name : Configuring the catalogue
  hosts : catalogue
  become : yes

  tasks :
  - name : Enable required module
    command : dnf module enable nodejs:20 -y
  
  - name : install nodejs 20
    package :
      name : nodejs
      state : present
      
  - name : create roboshop system user
    user :
      name : roboshop
      system : true 
      home : /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name : remove app directory
    file :
      path: /app
      state: absent

  - name : Delete catalogue.zip file in the tmp directory
    file :
      path: /tmp/catalogue.zip
      state: absent

  - name : create app directory
    file :
      path: /app
      state: directory

  - name : Download catalogue 
    get_url:
       url:  https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
       dest: /tmp/catalogue.zip

  - name : unzip catalogue
    unarchive:
      src : /tmp/catalogue.zip
      dest : /app
      remote_src: yes